<svg width="800" height="700" viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      /* 1단계: stroke로 선 그리기 */
      .logo-stroke {
        fill: none;
        stroke: #151515;
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
        stroke-dasharray: 1400;
        stroke-dashoffset: 1400;
        animation: drawPath 2.4s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards,
        hideStroke 0.01s ease 2.8s forwards;
      }
      /* 2단계: fill로 채우기 */
      .logo-fill {
        fill: #151515;
        opacity: 0;
        animation: fillIn 0.5s ease 2.7s forwards;
      }
      /* 3단계: 빨간 점 fadeIn */
      .red-dot {
        fill: #FF1F26;
        opacity: 0;
        animation: fadeIn 0.7s ease 3.1s forwards;
      }
      @keyframes drawPath {
        from { stroke-dashoffset: 1400; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes hideStroke {
        to { opacity: 0; }
      }
      @keyframes fillIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
    </style>
  </defs>

